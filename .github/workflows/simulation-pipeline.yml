name: Epistemological Simulation Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      turns:
        description: 'Number of debate turns to simulate'
        required: true
        default: '500'
      source_url:
        description: 'Data asset source URL to check provenance'
        required: true
        default: 'https://anon-drop-net.onion'

jobs:
  run-simulation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install flake8 for the explicit compilation and syntax health check
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Pre-Flight Check: Verify Critical Structural Files
      run: |
        echo "Verifying presence of baseline architecture modules..."
        MISSING_FILES=0
        
        # Array of absolute mandatory files for the Post-Authentic Postulate framework
        REQUIRED_FILES=(
          "main.py"
          "engine/__init__.py"
          "engine/core_states.py"
          "engine/provenance.py"
          "engine/demonstration.py"
          "tests/test_engine.py"
        )
        
        for file in "${REQUIRED_FILES[@]}"; do
          if [ ! -f "$file" ]; then
            echo "❌ ERROR: Mandatory file '$file' is missing from the directory structure."
            MISSING_FILES=$((MISSING_FILES + 1))
          else
            echo "✅ Verified: $file"
          fi
        done
        
        if [ $MISSING_FILES -gt 0 ]; then
          echo "Pipeline aborted due to structural failure."
          exit 1
        fi

    - name: Pre-Flight Check: Catch Future Syntax/Compilation Errors
      run: |
        echo "Scanning files for syntax errors and critical compilation bugs..."
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Execute Logical Unit Tests
      run: |
        # Run test suites before launching main simulation
        python -m unittest discover -s tests

    - name: Execute Automated 500-Turn Debate Simulation
      run: |
        # Fallback to defaults if workflow is triggered via standard push instead of manual UI dispatch
        TURNS="${{ github.event.inputs.turns || '500' }}"
        SOURCE="${{ github.event.inputs.source_url || 'https://anon-drop-net.onion' }}"
        
        echo "Launching simulation with $TURNS turns against source: $SOURCE"
        python main.py --turns "$TURNS" --source "$SOURCE" --output simulation_output.json

    - name: Archive Simulation Dialogue Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: epistemological-debate-log
        path: simulation_output.json
        retention-days: 7
