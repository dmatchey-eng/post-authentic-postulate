name: Epistemological Simulation Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      turns:
        description: 'Number of debate turns to simulate'
        required: true
        default: '500'
      source_url:
        description: 'Data asset source URL to check provenance'
        required: true
        default: 'https://anon-drop-net.onion'

jobs:
  run-simulation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Pre-Flight Check Verify Critical Structural Files
      run: |
        echo "Verifying presence of baseline architecture modules..."
        MISSING_FILES=0
        REQUIRED_FILES=(
  "engine/__init__.py"
  "engine/core_states.py"
  "engine/provenance.py"
  "engine/demonstration.py"
  "tests/test_engine.py"
  "LICENSE"
  "README.md"
  "main.py"
)

        for file in "${REQUIRED_FILES[@]}"; do
          if [ ! -f "$file" ]; then
            echo "Missing: $file"
            MISSING_FILES=$((MISSING_FILES + 1))
          fi
        done
        if [ $MISSING_FILES -gt 0 ]; then
          exit 1
        fi

    - name: Pre-Flight Check Catch Future Syntax Errors
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Execute Logical Unit Tests
      run: |
        python -m unittest discover -s tests

    - name: Execute Automated 500-Turn Debate Simulation
      run: |
        TURNS="${{ github.event.inputs.turns || '500' }}"
        SOURCE="${{ github.event.inputs.source_url || 'https://anon-drop-net.onion' }}"
        python main.py --turns "$TURNS" --source "$SOURCE" --output simulation_output.json

    - name: Archive Simulation Dialogue Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: epistemological-debate-log
        path: simulation_output.json
        retention-days: 7
